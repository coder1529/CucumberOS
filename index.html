<!DOCTYPE html>
<html>
<head>
  <title>CucumberOS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="font-family: Helvetica, sans-serif; background-color: cadetblue; background-image: url('./Background.jpg'); background-size: cover; margin: 0;">

  <!-- TOP BAR -->
  <div id="top" style="position: absolute; width: 100%; display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); color: white; padding: 10px;">
    <p style="margin-left: 10px;">CucumberOS</p>
    <p>WELCOME!</p>
    <p>🥒 CUCUMBERS 🥒</p>
    <p id="TIME" style="margin-right: 10px;">Time</p>
  </div>

  <!-- DESKTOP -->
  <div id="apps" style="padding-top: 60px; padding-left: 20px;">

    <!-- WELCOME WINDOW -->
    <div id="window" class="window" style="width: 280px; height: 260px; background: white; border-radius: 10px; padding: 10px; position: absolute;">
      <h2>WELCOME TO CUCUMBEROS</h2>
      <p>A simple OS UI project</p>
    </div>

    <!-- NOTE TAKER WINDOW -->
    <div id="notetaker" class="window" style="display:none; width: 500px; height: 500px; background: white; border-radius: 10px; padding: 10px; position: absolute;">
      <h2>Note Taker</h2>

      <div id="notesContent" style="background: #f1c9c9; height: 400px; padding: 10px; overflow-y: auto;">
        TYPE YOUR NOTES HERE...
      </div>
    </div>

    <!-- APP ICON -->
    <div onclick="document.getElementById('notetaker').style.display='block'" style="width: 80px; margin-top: 20px; cursor: pointer;">
      <img src="./ICON1.png" style="width: 64px; height: 64px;">
      <p>NoteTaker</p>
    </div>

  </div>

</body>
</html>
